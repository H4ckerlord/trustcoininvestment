{% extends "base.html" %}
{% block extra_head %}
<style>
body{background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#16213e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.admin-wrap{width:100%;max-width:400px;margin:0 auto}
.admin-card{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:36px 28px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.admin-icon{width:64px;height:64px;background:linear-gradient(135deg,#F5A623,#e8950f);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 12px 28px rgba(245,166,35,.4)}
.admin-icon i{color:#fff;font-size:28px}
h2{color:#fff;text-align:center;font-size:22px;font-weight:800;margin-bottom:6px}
p{color:rgba(255,255,255,.5);text-align:center;font-size:12px;margin-bottom:24px}
label{color:rgba(255,255,255,.7);font-size:12px;font-weight:600;display:block;margin-bottom:6px}
input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:10px;padding:12px 16px;width:100%;font-size:14px;outline:none;transition:.3s}
input::placeholder{color:rgba(255,255,255,.3)}
input:focus{border-color:var(--gold);background:rgba(255,255,255,.12)}
.btn-admin{background:linear-gradient(135deg,var(--gold),#e8950f);color:#fff;border:none;width:100%;padding:14px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;margin-top:16px;transition:.3s;font-family:'DM Sans',sans-serif}
.btn-admin:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(245,166,35,.4)}
.admin-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);color:var(--gold);padding:4px 16px;border-radius:50px;font-size:10px;font-weight:700;letter-spacing:1px;margin:0 auto 16px;display:flex;justify-content:center}
.err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#FCA5A5;padding:10px 14px;border-radius:8px;font-size:12px;text-align:center;display:none;margin-top:12px}
</style>
{% endblock %}
{% block body %}
<div class="admin-wrap">
  <div class="admin-card animate">
    <div class="admin-icon"><i class="fa-solid fa-user-shield"></i></div>
    <div class="admin-badge"><i class="fa-solid fa-lock"></i> ADMIN ACCESS ONLY</div>
    <h2>Admin Portal</h2>
    <p>TrustCoin Investment — Backend Control Panel</p>
    <div class="form-group">
      <label>Admin Password</label>
      <div style="position:relative">
        <input type="password" id="adminPwd" placeholder="Enter admin password"/>
      </div>
    </div>
    <button class="btn-admin" onclick="adminLogin()"><i class="fa-solid fa-right-to-bracket"></i> Access Dashboard</button>
    <div class="err" id="errBox">INVALID PASSWORD</div>
  </div>
</div>
<script>
function adminLogin(){
  const p=document.getElementById('adminPwd').value;
  const err=document.getElementById('errBox');
  fetch(window.location.pathname,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:p})})
  .then(r=>r.json()).then(res=>{
    if(res.success){window.location='/admin/dashboard'}
    else{err.style.display='block';setTimeout(()=>err.style.display='none',3000)}
  });
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')adminLogin()});
</script>
{% endblock %}
