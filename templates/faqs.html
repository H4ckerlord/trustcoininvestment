{% extends "base.html" %}
{% block extra_head %}
<style>
body{background:#F0F4FF;min-height:100vh}
.page-header{background:linear-gradient(135deg,var(--blue-dark),var(--blue));padding:40px 20px;text-align:center;color:#fff}
.page-header h1{font-size:clamp(22px,4vw,34px);font-weight:800;margin-bottom:8px}
.page-header p{opacity:.8;font-size:14px}
.back-btn{display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,.8);text-decoration:none;font-size:13px;margin-bottom:16px;transition:.3s}
.back-btn:hover{color:#fff}
.faq-wrap{max-width:700px;margin:0 auto;padding:32px 20px}
.faq-item{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.faq-question{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;cursor:pointer;transition:background .3s;gap:12px}
.faq-question:hover{background:#F9FAFB}
.faq-question h3{font-size:14px;font-weight:700;color:var(--text);flex:1}
.faq-icon{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:transform .3s}
.faq-item.open .faq-icon{transform:rotate(45deg)}
.faq-answer{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s}
.faq-item.open .faq-answer{max-height:400px;padding:0 20px 18px}
.faq-answer p{font-size:13px;color:var(--gray);line-height:1.8}
.num-badge{width:24px;height:24px;border-radius:50%;background:rgba(0,71,171,.1);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
</style>
{% endblock %}
{% block body %}
<div class="page-header">
  <a href="/" class="back-btn"><i class="fa-solid fa-arrow-left"></i>Back to Home</a>
  <h1>Frequently Asked Questions</h1>
  <p>Find answers to the most common questions about TrustCoin Investment</p>
</div>
<div class="faq-wrap">
  <div id="faqList"></div>
</div>
<script>
const faqs=[
  {q:"What is TrustCoin Investment and how does it work?",a:"TrustCoin Investment is a professional investment platform established in 2021 that helps individuals build generational wealth through high-yield investment plans. You deposit funds into your account, choose an investment plan that suits your budget, and receive guaranteed percentage returns at the end of your chosen plan duration. Our expert financial team manages your portfolio to maximize returns."},
  {q:"How do I create an account on TrustCoin Investment?",a:"Creating an account is very simple. Click the 'Sign Up' button on our homepage, fill in your personal details including your legal name, date of birth, email address, country of residence, employment status, and source of income. Then set a secure username and password, complete the verification process, and you're ready to start investing."},
  {q:"What are the available investment plans and their returns?",a:"We offer 10 investment plans: Starter ($100–$999, 5% ROI in 7 days), Basic ($1,000–$4,999, 7% ROI in 14 days), Silver ($5,000–$9,999, 10% ROI in 21 days), Gold ($10,000–$24,999, 12% ROI in 28 days), Premium ($25,000–$49,999, 15% ROI in 35 days), Platinum ($50,000–$99,999, 18% ROI in 42 days), Diamond ($100,000–$249,999, 20% ROI in 50 days), Elite ($250,000–$499,999, 22% ROI in 60 days), Ultimate ($500,000–$999,999, 25% ROI in 75 days), and Infinite ($1,000,000+, 30% ROI in 90 days)."},
  {q:"What is the minimum amount I can invest?",a:"The minimum investment amount at TrustCoin Investment is $100 USD. This falls under our Starter Plan which offers a 5% return on investment after 7 days. There is no maximum limit — the higher you invest, the higher your percentage returns."},
  {q:"How are my returns calculated and paid?",a:"Your returns are calculated based on the investment plan you choose. For example, if you invest $1,000 under the Basic Plan (7% ROI in 14 days), you will receive $1,070 at the end of 14 days — that is your original $1,000 plus $70 in profit. All returns are paid directly to your investment account balance, from which you can withdraw at any time."},
  {q:"How do I make a deposit or fund my investment?",a:"To fund your investment, log into your dashboard, click 'Invest', enter the amount you wish to invest, and you will be provided with a Bitcoin wallet address to send your payment to. After sending, upload your payment evidence and confirm the amount sent. Your account will be credited within 10 minutes of confirmation."},
  {q:"How do I withdraw my profits?",a:"To withdraw your profits, log into your dashboard and click 'Withdraw'. Enter the amount you wish to withdraw and provide your Bitcoin wallet address. Withdrawals are processed within few minutes. Please ensure your account is approved before attempting a withdrawal."},
  {q:"Why is my dashboard locked or showing as pending approval?",a:"When you first register, your account is reviewed by our system for compliance, security, and verification purposes. This process typically takes less than 24 hours. Once approved, all dashboard features including investing, withdrawing, and portfolio tracking will be fully unlocked. You will receive notification once your account is approved."},
  {q:"Is my investment and personal information secure?",a:"Yes, absolutely. TrustCoin Investment employs bank-grade security including military-grade encryption, multi-layer authentication protocols, and secure data storage. All personal information is treated as strictly confidential in accordance with our Privacy Policy. We never sell or share your data with third parties without your consent."},
  {q:"What is the wallet import feature and why do I need it?",a:"The wallet import feature allows you to connect your existing cryptocurrency wallet to your TrustCoin account for seamless fund management. This is a secure, read-only connection that helps our system verify your wallet for transaction purposes. You are required to import a wallet to begin investing for easier transactions."},
  {q:"How can I contact TrustCoin customer support?",a:"You can reach our customer support team through multiple channels: use the Help Center form on our website for specific assistance, use the Contact Us form to send us a message. Our support team operates 24 hours a day, 7 days a week, and all inquiries are typically responded to within 24 working hours."},
  {q:"Is TrustCoin Investment legally authorized to operate?",a:"Yes. TrustCoin Investment operates in full compliance with financial regulations applicable to investment companies in the United States. Our company is based at Franklin Avenue, Los Angeles, California, and complies with all relevant federal and state laws including SEC regulations, the Investment Advisers Act, the Bank Secrecy Act (BSA), and Anti-Money Laundering (AML) requirements. Full details are available on our Law & Regulation page."},
];
const list=document.getElementById('faqList');
faqs.forEach((f,i)=>{
  const item=document.createElement('div');item.className='faq-item';
  item.innerHTML=`<div class="faq-question" onclick="toggle(${i})"><div class="num-badge">${i+1}</div><h3>${f.q}</h3><div class="faq-icon">+</div></div><div class="faq-answer"><p>${f.a}</p></div>`;
  list.appendChild(item);
});
function toggle(idx){
  const items=document.querySelectorAll('.faq-item');
  items.forEach((item,i)=>{
    if(i===idx){item.classList.toggle('open')}
    else{item.classList.remove('open')}
  });
}
</script>
{% endblock %}
